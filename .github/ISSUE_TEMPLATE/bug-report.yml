name: Bug report
description: Report a broken command, provider setup, or review result.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, please run `bateye doctor` and check the troubleshooting guide.
  - type: input
    id: version
    attributes:
      label: BatEye version
      description: Output of `bateye --version`
      placeholder: 0.1.9
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 20.19.0
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: Which BatEye command failed?
      placeholder: bateye pr-review --base main --head HEAD
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Provider or model
      description: Example: vercel/openai/gpt-5.4-nano, anthropic/claude-sonnet-4-5
      placeholder: vercel/openai/gpt-5.4-nano
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the error message or degraded output summary.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Smallest repro wins.
      placeholder: |
        1. Run `bateye init`
        2. Set model to ...
        3. Run `bateye audit`
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Logs, screenshots, config snippets, or anything else useful.
