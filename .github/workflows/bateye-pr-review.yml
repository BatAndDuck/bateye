name: BatEye PR Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write   # Required for posting PR comments and (optionally) auto-approving
  # Note: for auto-approve to work, also enable:
  # Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"

jobs:
  bateye-review:
    name: BatEye Review
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Run only when someone comments "/review" on a PR
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review')

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            let prNumber, baseBranch, baseSha, headSha;
            let commentId = '';

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              baseBranch = context.payload.pull_request.base.ref;
              baseSha = context.payload.pull_request.base.sha;
              headSha = context.payload.pull_request.head.sha;
            } else {
              // issue_comment: look up the PR to get head SHA and base branch
              prNumber = context.payload.issue.number;
              commentId = String(context.payload.comment.id);
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              baseBranch = pr.base.ref;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
            }

            core.setOutput('pr-number', String(prNumber));
            core.setOutput('base-branch', baseBranch);
            core.setOutput('base-sha', baseSha);
            core.setOutput('head-sha', headSha);
            core.setOutput('comment-id', commentId);

      - name: Checkout PR code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.pr.outputs.head-sha }}
          fetch-depth: 0   # full history needed for git diff

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      # Build and link from source so we test the exact code in this PR,
      # not the last published npm version.
      - name: Install dependencies
        run: npm ci

      - name: Verify Codebite runtime
        run: node node_modules/codebite/bin/codebite.mjs --help > /dev/null

      - name: Run lint
        run: npm run lint

      - name: Run full test suite
        run: npm test

      - name: Link BatEye globally
        run: npm link

      # Create a minimal config if the repo doesn't have one yet.
      # To customise the model or reviewers, commit a .bateye/config.json
      # (see https://github.com/BatAndDuck/bateye#configuration).
      - name: Initialize BatEye config (if absent)
        run: |
          if [ ! -f .bateye/config.json ]; then
            mkdir -p .bateye
            cat > .bateye/config.json << 'EOF'
          {
            "model": "vercel/openai/gpt-5.4-nano"
          }
          EOF
          fi

      - name: Run BatEye PR Review
        env:
          BATEYE_LLM_MODEL_API_KEY: ${{ secrets.BATEYE_LLM_MODEL_API_KEY }}
          BATEYE_LLM_MODEL_API_KEY_FALLBACK: ${{ secrets.BATEYE_LLM_MODEL_API_KEY_FALLBACK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR_NUMBER lets BatEye detect the PR in issue_comment events
          # (for pull_request events it is read from GITHUB_REF automatically)
          PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
          # COMMENT_ID lets BatEye add eyes reaction to /review trigger comments
          COMMENT_ID: ${{ steps.pr.outputs.comment-id }}
        run: |
          bateye --diagnostic pr-review \
            --base ${{ steps.pr.outputs.base-sha }} \
            --github \
            --pr-number ${{ steps.pr.outputs.pr-number }}

      - name: Upload BatEye logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bateye-logs-${{ steps.pr.outputs.pr-number }}-${{ github.run_attempt }}
          path: |
            .bateye/out/prompts/
            .bateye/out/diagnostics/
          if-no-files-found: ignore
