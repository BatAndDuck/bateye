name: CodeOwl PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  codeowl-review:
    name: CodeOwl Review
    runs-on: ubuntu-latest

    # Run on all PR events, or when someone comments "/review" on a PR
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/review')
      )

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, baseBranch, headSha;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              baseBranch = context.payload.pull_request.base.ref;
              headSha = context.payload.pull_request.head.sha;
            } else {
              // issue_comment: look up the PR to get head SHA and base branch
              prNumber = context.payload.issue.number;
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              baseBranch = pr.base.ref;
              headSha = pr.head.sha;
            }

            core.setOutput('pr-number', String(prNumber));
            core.setOutput('base-branch', baseBranch);
            core.setOutput('head-sha', headSha);
            core.info(`PR #${prNumber} — base: ${baseBranch}, head: ${headSha}`);

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head-sha }}
          fetch-depth: 0   # full history needed for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Build and link from source so we test the exact code in this PR,
      # not the last published npm version.
      - name: Install dependencies
        run: npm ci

      - name: Build CodeOwl
        run: npm run build

      - name: Link CodeOwl globally
        run: npm link

      - name: Show active config
        run: |
          echo "=== .codeowl/config.json ==="
          cat .codeowl/config.json 2>/dev/null || echo "(no config file — using defaults)"
          echo ""
          echo "=== Secrets present ==="
          echo "CODE_OWL_LLM_MODEL_API_KEY      : $( [ -n "$CODE_OWL_LLM_MODEL_API_KEY" ]      && echo "set" || echo "NOT SET" )"
          echo "CODE_OWL_LLM_MODEL_API_KEY_FALLBACK : $( [ -n "$CODE_OWL_LLM_MODEL_API_KEY_FALLBACK" ] && echo "set" || echo "NOT SET" )"
        env:
          CODE_OWL_LLM_MODEL_API_KEY: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY }}
          CODE_OWL_LLM_MODEL_API_KEY_FALLBACK: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY_FALLBACK }}

      # Model and reviewer config is read from .codeowl/config.json in the repository.
      # See https://github.com/CodeNinjaArea/CodeOwl#configuration
      - name: Run CodeOwl PR Review
        env:
          CODE_OWL_LLM_MODEL_API_KEY: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY }}
          CODE_OWL_LLM_MODEL_API_KEY_FALLBACK: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY_FALLBACK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR_NUMBER lets CodeOwl detect the PR in issue_comment events
          # (for pull_request events it is read from GITHUB_REF automatically)
          PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        run: |
          echo "=== Starting CodeOwl PR Review ==="
          echo "PR   : #${{ steps.pr.outputs.pr-number }}"
          echo "Base : origin/${{ steps.pr.outputs.base-branch }}"
          echo "Head : ${{ steps.pr.outputs.head-sha }}"
          echo ""
          codeowl pr-review \
            --base origin/${{ steps.pr.outputs.base-branch }} \
            --github \
            --pr-number ${{ steps.pr.outputs.pr-number }}
