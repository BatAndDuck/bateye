name: CodeOwl PR Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write   # Required for posting PR comments and (optionally) auto-approving
  # Note: for auto-approve to work, also enable:
  # Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"

jobs:
  codeowl-review:
    name: CodeOwl Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Run on all PR events, or when someone comments "/review" on a PR
    if: |
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/review')
      )

    steps:
      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, baseBranch, baseSha, headSha;
            let commentId = '';

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              baseBranch = context.payload.pull_request.base.ref;
              baseSha = context.payload.pull_request.base.sha;
              headSha = context.payload.pull_request.head.sha;
            } else {
              // issue_comment: look up the PR to get head SHA and base branch
              prNumber = context.payload.issue.number;
              commentId = String(context.payload.comment.id);
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              baseBranch = pr.base.ref;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
            }

            core.setOutput('pr-number', String(prNumber));
            core.setOutput('base-branch', baseBranch);
            core.setOutput('base-sha', baseSha);
            core.setOutput('head-sha', headSha);
            core.setOutput('comment-id', commentId);

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head-sha }}
          fetch-depth: 0   # full history needed for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install OpenCode CLI
        run: npm install --global opencode-ai

      - name: Verify OpenCode CLI
        run: opencode --version

      # Build and link from source so we test the exact code in this PR,
      # not the last published npm version.
      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run full test suite
        run: npm test

      - name: Link CodeOwl globally
        run: npm link

      # Create a minimal config if the repo doesn't have one yet.
      # To customise the model or reviewers, commit a .codeowl/config.json
      # (see https://github.com/CodeNinjaArea/CodeOwl#configuration).
      - name: Initialize CodeOwl config (if absent)
        run: |
          if [ ! -f .codeowl/config.json ]; then
            mkdir -p .codeowl
            cat > .codeowl/config.json << 'EOF'
          {
            "model": "anthropic/claude-sonnet-4-5"
          }
          EOF
          fi

      - name: Run CodeOwl PR Review
        env:
          CODE_OWL_LLM_MODEL_API_KEY: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY }}
          CODE_OWL_LLM_MODEL_API_KEY_FALLBACK: ${{ secrets.CODE_OWL_LLM_MODEL_API_KEY_FALLBACK }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PR_NUMBER lets CodeOwl detect the PR in issue_comment events
          # (for pull_request events it is read from GITHUB_REF automatically)
          PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
          # COMMENT_ID lets CodeOwl add eyes reaction to /review trigger comments
          COMMENT_ID: ${{ steps.pr.outputs.comment-id }}
        run: |
          codeowl pr-review \
            --base ${{ steps.pr.outputs.base-sha }} \
            --github \
            --pr-number ${{ steps.pr.outputs.pr-number }}
