<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeOwl System Design Report</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3347;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
    --node-service: #7c3aed;
    --node-module: #2563eb;
    --node-app: #059669;
    --node-worker: #d97706;
    --node-gateway: #dc2626;
    --node-library: #6b7280;
    --node-resource: #0f766e;
    --node-integration: #0ea5e9;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  header .meta { font-size: 12px; color: var(--text-muted); }
  .score-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  .score-a { background: #064e3b; color: #6ee7b7; }
  .score-b { background: #1e3a5f; color: #93c5fd; }
  .score-c { background: #451a03; color: #fcd34d; }
  .score-d { background: #4c1d11; color: #fca5a5; }
  .arch-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: var(--surface2); color: var(--accent-light); border: 1px solid var(--border); margin-left: auto; }
  main { display: flex; flex: 1; overflow: hidden; }
  #canvas-area { flex: 1; position: relative; overflow: hidden; cursor: grab; }
  #canvas-area.dragging { cursor: grabbing; }
  #svg-canvas { width: 100%; height: 100%; }
  #panel { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s; }
  #panel.hidden { width: 0; }
  #panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #panel-title { font-size: 14px; font-weight: 600; }
  #panel-close { cursor: pointer; color: var(--text-muted); font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  #panel-close:hover { background: var(--surface2); color: var(--text); }
  #panel-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 13px; line-height: 1.6; }
  #panel-body h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 6px; }
  #panel-body h3:first-child { margin-top: 0; }
  #panel-body p { color: var(--text-muted); margin-bottom: 4px; }
  #panel-body ul { list-style: none; padding: 0; }
  #panel-body li { padding: 3px 0; color: var(--text-muted); font-size: 12px; }
  #panel-body li::before { content: '→ '; color: var(--accent-light); }
  .kind-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .kind-service { background: #4c1d95; color: #c4b5fd; }
  .kind-module { background: #1e3a8a; color: #93c5fd; }
  .kind-app { background: #064e3b; color: #6ee7b7; }
  .kind-worker { background: #451a03; color: #fcd34d; }
  .kind-gateway { background: #4c0519; color: #fca5a5; }
  .kind-library { background: #1f2937; color: #9ca3af; }
  .kind-resource { background: #042f2e; color: #5eead4; }
  .resource-pill { display: inline-flex; align-items: center; gap: 6px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-left: 8px; border: 1px solid var(--border); }
  .interface-item { padding: 4px 8px; background: var(--surface2); border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
  .interface-type { color: var(--accent-light); font-weight: 600; margin-right: 6px; }
  .entity-item { padding: 4px 8px; background: var(--surface2); border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
  .submodule-list, .integration-list { display: grid; gap: 8px; }
  .submodule-item, .integration-item { padding: 8px 10px; background: var(--surface2); border-radius: 6px; font-size: 12px; }
  .submodule-name, .integration-name { color: var(--text); font-weight: 600; }
  .submodule-meta, .integration-meta { color: var(--text-muted); font-size: 11px; margin-top: 3px; }
  .integration-group { margin-bottom: 14px; }
  .integration-description { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
  .capability-item { padding: 8px 10px; background: var(--surface2); border-radius: 6px; font-size: 12px; color: var(--text); }
  .edge-pill { display: inline-block; padding: 2px 6px; border-radius: 999px; background: #ffffff12; color: var(--accent-light); font-size: 10px; margin-left: 6px; }
  .integration-arrow { color: var(--accent-light); font-size: 10px; }
  .complexity-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .complexity-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .complexity-fill { height: 100%; border-radius: 2px; }
  .complexity-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .toolbar { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 8px; }
  .tool-btn { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; cursor: pointer; }
  .tool-btn:hover { background: var(--surface2); }
  .legend { position: absolute; top: 12px; right: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .node-selected rect { filter: drop-shadow(0 0 12px rgba(167,139,250,0.7)); }
  #summary-bar { padding: 10px 20px; background: var(--surface); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); display: flex; gap: 20px; flex-shrink: 0; }
  #summary-bar span { color: var(--text); font-weight: 500; }
  .tabs { display: flex; gap: 2px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 5px 12px; font-size: 12px; border-radius: 5px; cursor: pointer; color: var(--text-muted); }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }
  #welcome { padding: 16px; color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 40px; }
  #welcome .icon { font-size: 36px; margin-bottom: 8px; }
  #welcome p { margin-bottom: 6px; }
</style>
</head>
<body>
<header>
  <h1>🦉 CodeOwl System Design</h1>
  <div class="meta" id="header-meta"></div>
  <div class="arch-tag" id="arch-tag"></div>
</header>
<main>
  <div id="canvas-area">
    <svg id="svg-canvas">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
        </marker>
      </defs>
      <g id="graph-root"></g>
    </svg>
    <div class="toolbar">
      <button class="tool-btn" onclick="fitView()">⊞ Fit</button>
      <button class="tool-btn" onclick="zoomIn()">+</button>
      <button class="tool-btn" onclick="zoomOut()">−</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div id="panel" class="hidden">
    <div id="panel-header">
      <div id="panel-title">Details</div>
      <div id="panel-close" onclick="closePanel()">×</div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('overview')">Overview</div>
      <div class="tab" onclick="showTab('submodules')">Modules</div>
      <div class="tab" onclick="showTab('capabilities')">Capabilities</div>
      <div class="tab" onclick="showTab('integrations')">Integrations</div>
    </div>
    <div id="panel-body">
      <div id="welcome"><div class="icon">🦉</div><p>Click a node to see details</p></div>
    </div>
  </div>
</main>
<div id="summary-bar">
  <div>Services: <span id="svc-count">0</span></div>
  <div>Confidence: <span id="coverage-confidence">0%</span></div>
  <div>Gaps: <span id="coverage-gaps">0</span></div>
  <div id="arch-summary"></div>
  <div id="global-summary"></div>
</div>

<script>
const DATA = __CODEOWL_DATA__;

let transform = { x: 0, y: 0, scale: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };
let nodes = [];
let edges = [];
let selectedNode = null;
let currentTab = 'overview';

const KIND_COLORS = {
  app: '#2563eb',
  gateway: '#ea580c',
  worker: '#ca8a04',
  service: '#7c3aed',
  module: '#0891b2',
  library: '#64748b',
  resource: '#94a3b8'
};
const RESOURCE_CATEGORY_COLORS = {
  database: '#38bdf8',
  cache: '#22c55e',
  queue: '#f59e0b',
  storage: '#0ea5e9',
  'vector-search': '#a855f7',
  'external-saas': '#f97316',
  'external-api': '#ec4899',
  'internal-platform': '#14b8a6'
};
const PRIMARY_KINDS = new Set(['app', 'gateway', 'worker', 'service']);
const SUPPORT_KINDS = new Set(['module', 'library']);

// Node size range driven by complexityScore (1-10)
const NODE_MIN_W = 140, NODE_MAX_W = 230;
const NODE_MIN_H = 62,  NODE_MAX_H = 96;

function nodeSize(score, kind) {
  if (kind === 'resource') {
    return { w: 148, h: 56 };
  }
  const s = Math.max(1, Math.min(10, score || 5));
  const t = (s - 1) / 9;
  const emphasis = kind === 'resource' ? 0.78 : SUPPORT_KINDS.has(kind) ? 0.9 : 1.08;
  return {
    w: Math.round((NODE_MIN_W + t * (NODE_MAX_W - NODE_MIN_W)) * emphasis),
    h: Math.round((NODE_MIN_H + t * (NODE_MAX_H - NODE_MIN_H)) * emphasis),
  };
}

function complexityColor(score) {
  if (score <= 3) return '#10b981';
  if (score <= 6) return '#f59e0b';
  return '#ef4444';
}

function init() {
  if (!DATA || !DATA.nodes) return;
  nodes = DATA.nodes;
  edges = DATA.edges || [];

  document.getElementById('header-meta').textContent =
    `Generated ${new Date(DATA.metadata.generatedAt).toLocaleDateString()}`;
  document.getElementById('arch-tag').textContent =
    DATA.metadata.architectureType.replace(/-/g, ' ');

  document.getElementById('svc-count').textContent = nodes.length;
  document.getElementById('coverage-confidence').textContent =
    `${Math.round(((DATA.metadata.coverage || {}).overallConfidence || 0) * 100)}%`;
  document.getElementById('coverage-gaps').textContent =
    ((DATA.metadata.coverage || {}).gaps || []).length;
  document.getElementById('arch-summary').textContent = DATA.metadata.architectureType.replace(/-/g, ' ');
  document.getElementById('global-summary').textContent = DATA.metadata.globalSummary || '';

  buildLegend();
  layoutNodes();
  renderGraph();
  setupPan();
  setTimeout(fitView, 100);
}

function buildLegend() {
  const order = ['app', 'gateway', 'worker', 'service', 'module', 'library', 'resource'];
  const kinds = order.filter(kind => nodes.some(node => node.kind === kind));
  const legend = document.getElementById('legend');
  const kindLegend = kinds.map(k =>
    `<div class="legend-item"><div class="legend-dot" style="background:${KIND_COLORS[k]||'#6b7280'}"></div>${k}</div>`
  ).join('');
  const resourceCategories = [...new Set(nodes
    .filter(node => node.kind === 'resource' && node.data?.resourceCategory)
    .map(node => node.data.resourceCategory))];
  const resourceLegend = resourceCategories.map(category =>
    `<div class="legend-item"><div class="legend-dot" style="background:${RESOURCE_CATEGORY_COLORS[category]||KIND_COLORS.resource}"></div>${resourceCategoryLabel(category)}</div>`
  ).join('');
  legend.innerHTML = `${kindLegend}${resourceLegend ? '<div class="legend-item" style="margin-top:8px;color:#e2e8f0">Resources</div>' + resourceLegend : ''}`;
}

function layoutNodes() {
  const groups = [
    { kinds: ['app', 'gateway', 'worker', 'service'], x: 40, cols: 2, gapX: 80, gapY: 78 },
    { kinds: ['module', 'library'], x: 620, cols: 1, gapX: 70, gapY: 60 },
    { kinds: ['resource'], x: 900, cols: 1, gapX: 50, gapY: 42 },
  ];

  groups.forEach(group => {
    const groupNodes = nodes.filter(node => group.kinds.includes(node.kind));
    groupNodes.forEach((n, i) => {
      const sz = nodeSize(n.data?.complexityScore, n.kind);
      n._w = sz.w;
      n._h = sz.h;
      n._x = group.x + (i % group.cols) * (NODE_MAX_W + group.gapX);
      n._y = Math.floor(i / group.cols) * (NODE_MAX_H + group.gapY) + 40;
    });
  });

  nodes.forEach(n => {
    if (n._w) return;
    const sz = nodeSize(n.data?.complexityScore, n.kind);
    n._w = sz.w;
    n._h = sz.h;
    n._x = 40;
    n._y = 40;
  });
}

function renderGraph() {
  const root = document.getElementById('graph-root');
  root.innerHTML = '';

  // Draw edges
  const edgeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeG.setAttribute('class', 'edges');
  edges.forEach(e => {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    if (!src || !tgt) return;
    const x1 = src._x + src._w / 2, y1 = src._y + src._h / 2;
    const x2 = tgt._x + tgt._w / 2, y2 = tgt._y + tgt._h / 2;
    const mx = (x1 + x2) / 2;
    const resourceEdge = src.kind === 'resource' || tgt.kind === 'resource';
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', resourceEdge ? '#64748b' : '#475569');
    p.setAttribute('stroke-width', resourceEdge ? '1.2' : '2');
    p.setAttribute('marker-end', 'url(#arrow)');
    p.setAttribute('opacity', resourceEdge ? '0.35' : '0.72');
    if (resourceEdge) p.setAttribute('stroke-dasharray', '6 5');
    edgeG.appendChild(p);
  });
  root.appendChild(edgeG);

  // Draw nodes
  const nodeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeG.setAttribute('class', 'nodes');
  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-group' + (selectedNode === n.id ? ' node-selected' : ''));
    g.setAttribute('data-id', n.id);
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => selectNode(n.id));

    const resourceCategory = n.data?.resourceCategory;
    const color = n.kind === 'resource'
      ? (RESOURCE_CATEGORY_COLORS[resourceCategory] || KIND_COLORS.resource)
      : (KIND_COLORS[n.kind] || '#6b7280');
    const isSelected = selectedNode === n.id;
    const complexity = n.data?.complexityScore || 5;
    const primary = PRIMARY_KINDS.has(n.kind);
    const subtle = n.kind === 'resource';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', n._x);
    rect.setAttribute('y', n._y);
    rect.setAttribute('width', n._w);
    rect.setAttribute('height', n._h);
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', subtle ? color + '12' : primary ? color + '30' : color + '20');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', isSelected ? '2.5' : primary ? '1.8' : '1');
    rect.style.filter = isSelected
      ? 'drop-shadow(0 0 12px rgba(167,139,250,0.7))'
      : primary
        ? 'drop-shadow(0 4px 16px rgba(0,0,0,0.45))'
        : 'drop-shadow(0 2px 8px rgba(0,0,0,0.25))';
    rect.style.cursor = 'pointer';

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', n._x + n._w / 2);
    label.setAttribute('y', n._y + (subtle ? 22 : (n._h / 2 - 14)));
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#e2e8f0');
    label.setAttribute('font-size', primary ? '14' : '12');
    label.setAttribute('font-weight', primary ? '700' : '600');
    label.setAttribute('font-family', 'system-ui, sans-serif');
    label.setAttribute('pointer-events', 'none');
    splitLabel(n.label, subtle ? 16 : (primary ? 20 : 16)).forEach((line, index) => {
      const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
      tspan.setAttribute('x', n._x + n._w / 2);
      tspan.setAttribute('dy', index === 0 ? '0' : (subtle ? '13' : '15'));
      tspan.textContent = line;
      label.appendChild(tspan);
    });

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', n._x + n._w / 2);
    sub.setAttribute('y', n._y + n._h - 18);
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('fill', subtle ? '#cbd5e1' : color);
    sub.setAttribute('font-size', '10');
    sub.setAttribute('font-family', 'system-ui, sans-serif');
    sub.setAttribute('pointer-events', 'none');
    sub.textContent = subtle ? resourceCategoryLabel(resourceCategory) : n.kind;

    const badge = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    badge.setAttribute('x', n._x + n._w - 12);
    badge.setAttribute('y', n._y + 16);
    badge.setAttribute('text-anchor', 'end');
    badge.setAttribute('fill', color);
    badge.setAttribute('font-size', '10');
    badge.setAttribute('font-weight', '700');
    badge.setAttribute('font-family', 'system-ui, sans-serif');
    badge.setAttribute('pointer-events', 'none');
    badge.textContent = subtle ? resourceCategoryIcon(resourceCategory) : kindIcon(n.kind);

    g.appendChild(rect);
    g.appendChild(label);
    g.appendChild(sub);
    g.appendChild(badge);
    if (!subtle) {
      const barW = Math.round((complexity / 10) * (n._w - 24));
      const barBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      barBg.setAttribute('x', n._x + 12);
      barBg.setAttribute('y', n._y + n._h - 10);
      barBg.setAttribute('width', n._w - 24);
      barBg.setAttribute('height', 3);
      barBg.setAttribute('rx', '1.5');
      barBg.setAttribute('fill', '#ffffff18');
      barBg.setAttribute('pointer-events', 'none');

      const barFg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      barFg.setAttribute('x', n._x + 12);
      barFg.setAttribute('y', n._y + n._h - 10);
      barFg.setAttribute('width', barW);
      barFg.setAttribute('height', 3);
      barFg.setAttribute('rx', '1.5');
      barFg.setAttribute('fill', complexityColor(complexity));
      barFg.setAttribute('pointer-events', 'none');
      g.appendChild(barBg);
      g.appendChild(barFg);
    }
    nodeG.appendChild(g);
  });
  root.appendChild(nodeG);
  applyTransform();
}

function applyTransform() {
  document.getElementById('graph-root').setAttribute(
    'transform', `translate(${transform.x},${transform.y}) scale(${transform.scale})`
  );
}

function fitView() {
  if (!nodes.length) return;
  const canvasEl = document.getElementById('canvas-area');
  const W = canvasEl.clientWidth, H = canvasEl.clientHeight;
  const minX = Math.min(...nodes.map(n => n._x));
  const maxX = Math.max(...nodes.map(n => n._x + n._w));
  const minY = Math.min(...nodes.map(n => n._y));
  const maxY = Math.max(...nodes.map(n => n._y + n._h));
  const gW = maxX - minX + 80, gH = maxY - minY + 80;
  const scale = Math.min(W / gW, H / gH, 1.2);
  transform.scale = scale;
  transform.x = (W - gW * scale) / 2 - minX * scale + 40;
  transform.y = (H - gH * scale) / 2 - minY * scale + 40;
  applyTransform();
}

function zoomIn() { transform.scale = Math.min(transform.scale * 1.2, 3); applyTransform(); }
function zoomOut() { transform.scale = Math.max(transform.scale / 1.2, 0.2); applyTransform(); }

function setupPan() {
  const area = document.getElementById('canvas-area');
  area.addEventListener('mousedown', e => {
    if (e.target.closest('.node-group')) return;
    dragging = true;
    dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    area.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    transform.x = e.clientX - dragStart.x;
    transform.y = e.clientY - dragStart.y;
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    document.getElementById('canvas-area').classList.remove('dragging');
  });
  area.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    transform.scale = Math.max(0.2, Math.min(3, transform.scale * delta));
    applyTransform();
  }, { passive: false });
}

function selectNode(id) {
  selectedNode = id;
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('panel-title').textContent = node.label;
  showTab(currentTab, node);
  renderGraph();
}

function closePanel() {
  selectedNode = null;
  document.getElementById('panel').classList.add('hidden');
  renderGraph();
}

function showTab(tab, nodeOverride) {
  currentTab = tab;
  const tabOrder = ['overview', 'submodules', 'capabilities', 'integrations'];
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', tabOrder[i] === tab);
  });
  const node = nodeOverride || nodes.find(n => n.id === selectedNode);
  if (!node) return;
  const data = node.data;
  const body = document.getElementById('panel-body');
  const complexity = data.complexityScore || 5;
  const cColor = complexityColor(complexity);
  const resourcePill = data.kind === 'resource'
    ? `<span class="resource-pill" style="background:${(RESOURCE_CATEGORY_COLORS[data.resourceCategory] || KIND_COLORS.resource)}18;color:${RESOURCE_CATEGORY_COLORS[data.resourceCategory] || KIND_COLORS.resource}">${escHtml(resourceCategoryLabel(data.resourceCategory))}</span>`
    : '';

  if (tab === 'overview') {
    body.innerHTML = `
      <span class="kind-badge kind-${data.kind}">${data.kind}</span>${resourcePill}
      ${data.kind === 'resource' ? '' : `
      <div class="complexity-bar">
        <div class="complexity-track">
          <div class="complexity-fill" style="width:${complexity * 10}%;background:${cColor}"></div>
        </div>
        <span class="complexity-label" style="color:${cColor}">Complexity ${complexity}/10</span>
      </div>`}
      <h3>Description</h3><p>${escHtml(data.purpose)}</p>
      <h3>Responsibilities</h3>
      <ul>${(data.responsibilities || []).map(r => `<li>${escHtml(r)}</li>`).join('') || '<li style="color:var(--text-muted)">None</li>'}</ul>
      <h3>Inner Structure</h3>
      ${(data.submodules || []).length > 0
        ? `<div class="submodule-list">${(data.submodules || []).slice(0, 6).map(module => `
            <div class="submodule-item">
              <div class="submodule-name">${escHtml(module)}</div>
              <div class="submodule-meta">Detected feature/layer inside ${escHtml(data.name)}</div>
            </div>`).join('')}</div>`
        : '<p>No clear submodules detected</p>'}
    `;
  } else if (tab === 'submodules') {
    body.innerHTML = `
      <h3>Inner Modules / Code Services</h3>
      ${(data.submodules || []).length === 0
        ? '<p>None detected</p>'
        : `<div class="submodule-list">${(data.submodules || []).map(module => `
            <div class="submodule-item">
              <div class="submodule-name">${escHtml(module)}</div>
              <div class="submodule-meta">Detected as an internal module or architectural layer of ${escHtml(data.name)}</div>
            </div>`).join('')}</div>`}
      <h3>Entities</h3>
      ${(data.entities || []).length === 0 ? '<p>None detected</p>' :
        (data.entities || []).map(e => `
          <div class="entity-item">
            <strong>${escHtml(e.name)}</strong>
            ${e.description ? `<br><span style="color:var(--text-muted);font-size:11px">${escHtml(e.description)}</span>` : ''}
            ${e.fields?.length ? `<br><span style="color:var(--text-muted);font-size:11px">Fields: ${escHtml(e.fields.join(', '))}</span>` : ''}
          </div>`).join('')}
    `;
  } else if (tab === 'capabilities') {
    body.innerHTML = `
      <h3>Capabilities</h3>
      ${(data.capabilities || []).length === 0
        ? '<p>None detected</p>'
        : `<div class="integration-list">${(data.capabilities || []).map(capability => `
            <div class="capability-item">${escHtml(capability)}</div>
          `).join('')}</div>`}
    `;
  } else if (tab === 'integrations') {
    const outbound = edges.filter(e => e.source === node.id);
    const inbound = edges.filter(e => e.target === node.id);
    body.innerHTML = `
      <div class="integration-group">
        <h3>Outbound Integrations</h3>
        ${renderIntegrationList(node, outbound, 'target')}
      </div>
      <div class="integration-group">
        <h3>Inbound Integrations</h3>
        ${renderIntegrationList(node, inbound, 'source')}
      </div>
      <div class="integration-group">
        <h3>Public Interfaces</h3>
        ${(data.publicInterfaces || []).length === 0 ? '<p>None detected</p>' :
          `<div class="integration-list">${(data.publicInterfaces || []).map(i => `
            <div class="interface-item">
              <span class="interface-type">${escHtml(i.type.toUpperCase())}</span>
              ${escHtml(i.name)}
              ${i.description ? `<br><span style="color:var(--text-muted);font-size:11px">${escHtml(i.description)}</span>` : ''}
            </div>`).join('')}</div>`}
      </div>
      <div class="integration-group">
        <h3>Infrastructure Resources</h3>
        ${renderDeclaredIntegrations(data.integrations || [], 'infrastructure')}
      </div>
      <div class="integration-group">
        <h3>External Services / APIs</h3>
        ${renderDeclaredIntegrations(data.integrations || [], 'external')}
      </div>
    `;
  }
}

function renderIntegrationList(node, edgeList, direction) {
  if (!edgeList.length) return '<p>None detected</p>';

  return `<div class="integration-list">${edgeList.map(edge => {
    const otherId = direction === 'target' ? edge.target : edge.source;
    const otherNode = nodes.find(n => n.id === otherId);
    if (!otherNode) return '';
    const integrationSource = direction === 'target' ? node : otherNode;
    const integrationTarget = direction === 'target' ? otherNode : node;
    const integration = findIntegration(integrationSource.data, integrationTarget);
    return `
      <div class="integration-item">
        <div class="integration-name">${escHtml(otherNode.label)}<span class="edge-pill">${escHtml(edge.label || edge.type)}</span></div>
        <div class="integration-meta">${escHtml(otherNode.kind === 'resource' ? resourceCategoryLabel(otherNode.data?.resourceCategory) : otherNode.kind)}</div>
        ${integration?.description ? `<div class="integration-description">${escHtml(integration.description)}</div>` : ''}
      </div>`;
  }).join('')}</div>`;
}

function renderDeclaredIntegrations(integrations, mode) {
  const filtered = integrations.filter(integration => {
    if (integration.internal) return false;
    const category = integration.category || '';
    const isExternal = category === 'external-saas' || category === 'external-api' || !category;
    return mode === 'external' ? isExternal : !isExternal;
  });
  if (!filtered.length) return '<p>None detected</p>';

  return `<div class="integration-list">${filtered.map(integration => `
    <div class="integration-item">
      <div class="integration-name">
        ${escHtml(integration.name)}
        ${integration.category ? `<span class="edge-pill">${escHtml(resourceCategoryLabel(integration.category))}</span>` : ''}
      </div>
      <div class="integration-description">${escHtml(integration.description)}</div>
    </div>
  `).join('')}</div>`;
}

function findIntegration(data, otherNode) {
  const candidates = data.integrations || [];
  const otherTokens = buildNodeAliases(otherNode);
  return candidates.find(integration => {
    const integrationTokens = buildIntegrationAliases(integration);
    return integrationTokens.some(token => otherTokens.has(token));
  });
}

function buildIntegrationAliases(integration) {
  return [integration.name, integration.category, integration.description]
    .filter(Boolean)
    .map(normalizeToken);
}

function buildNodeAliases(node) {
  const aliases = new Set([normalizeToken(node.id), normalizeToken(node.label)]);
  if (node.kind === 'resource' && node.data?.resourceCategory) {
    aliases.add(normalizeToken(node.data.resourceCategory));
  }
  return aliases;
}

function normalizeToken(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
}

function resourceCategoryLabel(category) {
  switch (category) {
    case 'database': return 'Database';
    case 'cache': return 'Cache';
    case 'queue': return 'Queue';
    case 'storage': return 'Storage';
    case 'vector-search': return 'Vector Search';
    case 'external-saas': return 'External SaaS';
    case 'external-api': return 'External API';
    case 'internal-platform': return 'Internal Platform';
    default: return 'Resource';
  }
}

function resourceCategoryIcon(category) {
  switch (category) {
    case 'database': return 'DB';
    case 'cache': return 'CA';
    case 'queue': return 'Q';
    case 'storage': return 'ST';
    case 'vector-search': return 'VS';
    case 'external-saas': return 'SAAS';
    case 'external-api': return 'API';
    case 'internal-platform': return 'INT';
    default: return 'RES';
  }
}

function kindIcon(kind) {
  switch (kind) {
    case 'app': return 'APP';
    case 'gateway': return 'BFF';
    case 'worker': return 'WRK';
    case 'service': return 'SRV';
    case 'module': return 'MOD';
    case 'library': return 'LIB';
    default: return 'SYS';
  }
}

function splitLabel(label, maxLen) {
  if (label.length <= maxLen) return [label];
  const words = label.split(' ');
  if (words.length === 1) return [label.slice(0, maxLen), label.slice(maxLen, maxLen * 2)];
  const lines = [];
  let current = '';
  for (const word of words) {
    const next = current ? `${current} ${word}` : word;
    if (next.length > maxLen && current) {
      lines.push(current);
      current = word;
      if (lines.length === 1) break;
    } else {
      current = next;
    }
  }
  if (current) lines.push(current);
  return lines.slice(0, 2);
}

function escHtml(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

init();
</script>
</body>
</html>
