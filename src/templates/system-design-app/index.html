<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeOwl System Design Report</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --border: #2e3347;
    --text: #e2e8f0;
    --text-muted: #8892a4;
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --blue: #3b82f6;
    --node-service: #7c3aed;
    --node-module: #2563eb;
    --node-app: #059669;
    --node-worker: #d97706;
    --node-gateway: #dc2626;
    --node-library: #6b7280;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); }
  header .meta { font-size: 12px; color: var(--text-muted); }
  .score-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  .score-a { background: #064e3b; color: #6ee7b7; }
  .score-b { background: #1e3a5f; color: #93c5fd; }
  .score-c { background: #451a03; color: #fcd34d; }
  .score-d { background: #4c1d11; color: #fca5a5; }
  .arch-tag { padding: 3px 8px; border-radius: 4px; font-size: 11px; background: var(--surface2); color: var(--accent-light); border: 1px solid var(--border); margin-left: auto; }
  main { display: flex; flex: 1; overflow: hidden; }
  #canvas-area { flex: 1; position: relative; overflow: hidden; cursor: grab; }
  #canvas-area.dragging { cursor: grabbing; }
  #svg-canvas { width: 100%; height: 100%; }
  #panel { width: 340px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s; }
  #panel.hidden { width: 0; }
  #panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #panel-title { font-size: 14px; font-weight: 600; }
  #panel-close { cursor: pointer; color: var(--text-muted); font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  #panel-close:hover { background: var(--surface2); color: var(--text); }
  #panel-body { flex: 1; overflow-y: auto; padding: 16px; font-size: 13px; line-height: 1.6; }
  #panel-body h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 16px 0 6px; }
  #panel-body h3:first-child { margin-top: 0; }
  #panel-body p { color: var(--text-muted); margin-bottom: 4px; }
  #panel-body ul { list-style: none; padding: 0; }
  #panel-body li { padding: 3px 0; color: var(--text-muted); font-size: 12px; }
  #panel-body li::before { content: '→ '; color: var(--accent-light); }
  .kind-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .kind-service { background: #4c1d95; color: #c4b5fd; }
  .kind-module { background: #1e3a8a; color: #93c5fd; }
  .kind-app { background: #064e3b; color: #6ee7b7; }
  .kind-worker { background: #451a03; color: #fcd34d; }
  .kind-gateway { background: #4c0519; color: #fca5a5; }
  .kind-library { background: #1f2937; color: #9ca3af; }
  .interface-item { padding: 4px 8px; background: var(--surface2); border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
  .interface-type { color: var(--accent-light); font-weight: 600; margin-right: 6px; }
  .risk-item { padding: 4px 8px; background: #2d1515; border-radius: 4px; margin-bottom: 4px; font-size: 12px; color: #fca5a5; }
  .entity-item { padding: 4px 8px; background: var(--surface2); border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
  .toolbar { position: absolute; bottom: 16px; left: 16px; display: flex; gap: 8px; }
  .tool-btn { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; cursor: pointer; }
  .tool-btn:hover { background: var(--surface2); }
  .legend { position: absolute; top: 12px; right: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .node-rect { rx: 8; ry: 8; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4)); cursor: pointer; transition: filter 0.15s; }
  .node-rect:hover { filter: drop-shadow(0 4px 12px rgba(124,58,237,0.5)); }
  .node-selected rect { filter: drop-shadow(0 0 12px rgba(167,139,250,0.7)); }
  #summary-bar { padding: 10px 20px; background: var(--surface); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); display: flex; gap: 20px; flex-shrink: 0; }
  #summary-bar span { color: var(--text); font-weight: 500; }
  .tabs { display: flex; gap: 2px; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 5px 12px; font-size: 12px; border-radius: 5px; cursor: pointer; color: var(--text-muted); }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }
  #welcome { padding: 16px; color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 40px; }
  #welcome .icon { font-size: 36px; margin-bottom: 8px; }
  #welcome p { margin-bottom: 6px; }
</style>
</head>
<body>
<header>
  <h1>🦉 CodeOwl System Design</h1>
  <div class="meta" id="header-meta"></div>
  <div class="arch-tag" id="arch-tag"></div>
  <div class="score-badge" id="score-badge"></div>
</header>
<main>
  <div id="canvas-area">
    <svg id="svg-canvas">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
        </marker>
        <marker id="arrow-dep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
        </marker>
      </defs>
      <g id="graph-root"></g>
    </svg>
    <div class="toolbar">
      <button type="button" class="tool-btn" onclick="fitView()">⊞ Fit</button>
      <button type="button" class="tool-btn" onclick="zoomIn()">+</button>
      <button type="button" class="tool-btn" onclick="zoomOut()">−</button>
    </div>
    <div class="legend" id="legend"></div>
  </div>
  <div id="panel" class="hidden">
    <div id="panel-header">
      <div id="panel-title">Details</div>
      <div id="panel-close" onclick="closePanel()">×</div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('overview')">Overview</div>
      <div class="tab" onclick="showTab('interfaces')">Interfaces</div>
      <div class="tab" onclick="showTab('data')">Data</div>
      <div class="tab" onclick="showTab('risks')">Risks</div>
    </div>
    <div id="panel-body">
      <div id="welcome"><div class="icon">🦉</div><p>Click a node to see details</p></div>
    </div>
  </div>
</main>
<div id="summary-bar">
  <div>Services: <span id="svc-count">0</span></div>
  <div>Score: <span id="score-val">—</span></div>
  <div id="strength-preview"></div>
</div>

<script>
const DATA = __CODEOWL_DATA__;

let transform = { x: 0, y: 0, scale: 1 };
let dragging = false;
let dragStart = { x: 0, y: 0 };
let nodes = [];
let edges = [];
let selectedNode = null;
let currentTab = 'overview';

const KIND_COLORS = {
  service: '#7c3aed', module: '#2563eb', app: '#059669',
  worker: '#d97706', gateway: '#dc2626', library: '#6b7280'
};

function init() {
  if (!DATA || !DATA.nodes) return;
  nodes = DATA.nodes;
  edges = DATA.edges || [];

  document.getElementById('header-meta').textContent =
    `Generated ${new Date(DATA.metadata.generatedAt).toLocaleDateString()}`;
  document.getElementById('arch-tag').textContent =
    DATA.metadata.architectureType.replace(/-/g, ' ');

  const score = DATA.metadata.score;
  const badge = document.getElementById('score-badge');
  badge.textContent = `Score: ${score}`;
  badge.className = 'score-badge ' + (score >= 80 ? 'score-a' : score >= 65 ? 'score-b' : score >= 50 ? 'score-c' : 'score-d');

  document.getElementById('svc-count').textContent = nodes.length;
  document.getElementById('score-val').textContent = score + '/100';
  if (DATA.metadata.strengths?.length) {
    document.getElementById('strength-preview').textContent =
      '✓ ' + DATA.metadata.strengths[0];
  }

  buildLegend();
  layoutNodes();
  renderGraph();
  setupPan();
  setTimeout(fitView, 100);
}

function buildLegend() {
  const kinds = [...new Set(nodes.map(n => n.kind))];
  const legend = document.getElementById('legend');
  legend.innerHTML = kinds.map(k =>
    `<div class="legend-item"><div class="legend-dot" style="background:${KIND_COLORS[k]||'#6b7280'}"></div>${k}</div>`
  ).join('');
}

function layoutNodes() {
  const cols = Math.ceil(Math.sqrt(nodes.length));
  const W = 180, H = 80, GAPX = 60, GAPY = 50;
  nodes.forEach((n, i) => {
    n._x = (i % cols) * (W + GAPX) + 40;
    n._y = Math.floor(i / cols) * (H + GAPY) + 40;
    n._w = W;
    n._h = H;
  });
}

function renderGraph() {
  const root = document.getElementById('graph-root');
  root.innerHTML = '';

  // Draw edges
  const edgeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeG.setAttribute('class', 'edges');
  edges.forEach(e => {
    const src = nodes.find(n => n.id === e.source);
    const tgt = nodes.find(n => n.id === e.target);
    if (!src || !tgt) return;
    const x1 = src._x + src._w / 2;
    const y1 = src._y + src._h / 2;
    const x2 = tgt._x + tgt._w / 2;
    const y2 = tgt._y + tgt._h / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const mx = (x1 + x2) / 2;
    path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#4b5563');
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('marker-end', 'url(#arrow)');
    path.setAttribute('opacity', '0.6');
    edgeG.appendChild(path);
  });
  root.appendChild(edgeG);

  // Draw nodes
  const nodeG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeG.setAttribute('class', 'nodes');
  nodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'node-group' + (selectedNode === n.id ? ' node-selected' : ''));
    g.setAttribute('data-id', n.id);
    g.style.cursor = 'pointer';
    g.addEventListener('click', () => selectNode(n.id));

    const color = KIND_COLORS[n.kind] || '#6b7280';
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', n._x);
    rect.setAttribute('y', n._y);
    rect.setAttribute('width', n._w);
    rect.setAttribute('height', n._h);
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', color + '22');
    rect.setAttribute('stroke', color);
    rect.setAttribute('stroke-width', selectedNode === n.id ? '2' : '1');
    rect.style.filter = 'drop-shadow(0 2px 8px rgba(0,0,0,0.4))';

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', n._x + n._w / 2);
    label.setAttribute('y', n._y + n._h / 2 - 8);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', '#e2e8f0');
    label.setAttribute('font-size', '13');
    label.setAttribute('font-weight', '600');
    label.setAttribute('font-family', 'system-ui, sans-serif');
    label.textContent = n.label.length > 22 ? n.label.slice(0, 20) + '…' : n.label;

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', n._x + n._w / 2);
    sub.setAttribute('y', n._y + n._h / 2 + 12);
    sub.setAttribute('text-anchor', 'middle');
    sub.setAttribute('fill', color);
    sub.setAttribute('font-size', '10');
    sub.setAttribute('font-family', 'system-ui, sans-serif');
    sub.textContent = n.kind;

    g.appendChild(rect);
    g.appendChild(label);
    g.appendChild(sub);
    nodeG.appendChild(g);
  });
  root.appendChild(nodeG);
  applyTransform();
}

function applyTransform() {
  document.getElementById('graph-root').setAttribute(
    'transform', `translate(${transform.x},${transform.y}) scale(${transform.scale})`
  );
}

function fitView() {
  if (!nodes.length) return;
  const canvasEl = document.getElementById('canvas-area');
  const W = canvasEl.clientWidth, H = canvasEl.clientHeight;
  const minX = Math.min(...nodes.map(n => n._x));
  const maxX = Math.max(...nodes.map(n => n._x + n._w));
  const minY = Math.min(...nodes.map(n => n._y));
  const maxY = Math.max(...nodes.map(n => n._y + n._h));
  const gW = maxX - minX + 80, gH = maxY - minY + 80;
  const scale = Math.min(W / gW, H / gH, 1.2);
  transform.scale = scale;
  transform.x = (W - gW * scale) / 2 - minX * scale + 40;
  transform.y = (H - gH * scale) / 2 - minY * scale + 40;
  applyTransform();
}

function zoomIn() { transform.scale = Math.min(transform.scale * 1.2, 3); applyTransform(); }
function zoomOut() { transform.scale = Math.max(transform.scale / 1.2, 0.2); applyTransform(); }

function setupPan() {
  const area = document.getElementById('canvas-area');
  area.addEventListener('mousedown', e => {
    if (e.target.closest('.node-group')) return;
    dragging = true;
    dragStart = { x: e.clientX - transform.x, y: e.clientY - transform.y };
    area.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    transform.x = e.clientX - dragStart.x;
    transform.y = e.clientY - dragStart.y;
    applyTransform();
  });
  window.addEventListener('mouseup', () => { dragging = false; document.getElementById('canvas-area').classList.remove('dragging'); });
  area.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    transform.scale = Math.max(0.2, Math.min(3, transform.scale * delta));
    applyTransform();
  }, { passive: false });
}

function selectNode(id) {
  selectedNode = id;
  const node = nodes.find(n => n.id === id);
  if (!node) return;
  document.getElementById('panel').classList.remove('hidden');
  document.getElementById('panel-title').textContent = node.label;
  showTab(currentTab, node);
  renderGraph();
}

function closePanel() {
  selectedNode = null;
  document.getElementById('panel').classList.add('hidden');
  renderGraph();
}

function showTab(tab, nodeOverride) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['overview','interfaces','data','risks'][i] === tab);
  });
  const node = nodeOverride || nodes.find(n => n.id === selectedNode);
  if (!node) return;
  const data = node.data;
  const body = document.getElementById('panel-body');

  if (tab === 'overview') {
    body.innerHTML = `
      <span class="kind-badge kind-${data.kind}">${data.kind}</span>
      <h3>Purpose</h3><p>${escHtml(data.purpose)}</p>
      <h3>Responsibilities</h3>
      <ul>${(data.responsibilities||[]).map(r => `<li>${escHtml(r)}</li>`).join('')}</ul>
      <h3>Dependencies</h3>
      ${data.dependencies?.length ? `<ul>${data.dependencies.map(d => `<li>${escHtml(d)}</li>`).join('')}</ul>` : '<p>None</p>'}
    `;
  } else if (tab === 'interfaces') {
    body.innerHTML = `
      <h3>Public Interfaces</h3>
      ${(data.publicInterfaces||[]).length === 0 ? '<p>None detected</p>' :
        (data.publicInterfaces||[]).map(i => `
          <div class="interface-item">
            <span class="interface-type">${escHtml(i.type.toUpperCase())}</span>
            ${escHtml(i.name)}
            ${i.description ? `<br><span style="color:var(--text-muted);font-size:11px">${escHtml(i.description)}</span>` : ''}
          </div>`).join('')}
    `;
  } else if (tab === 'data') {
    body.innerHTML = `
      <h3>Entities & Data</h3>
      ${(data.entities||[]).length === 0 ? '<p>None detected</p>' :
        (data.entities||[]).map(e => `
          <div class="entity-item">
            <strong>${escHtml(e.name)}</strong>
            ${e.description ? `<br><span style="color:var(--text-muted);font-size:11px">${escHtml(e.description)}</span>` : ''}
            ${e.fields?.length ? `<br><span style="color:var(--text-muted);font-size:11px">Fields: ${escHtml(e.fields.join(', '))}</span>` : ''}
          </div>`).join('')}
    `;
  } else if (tab === 'risks') {
    body.innerHTML = `
      <h3>Risks</h3>
      ${(data.risks||[]).length === 0 ? '<p>No risks identified</p>' :
        (data.risks||[]).map(r => `<div class="risk-item">${escHtml(r)}</div>`).join('')}
    `;
  }
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
